name: CI
on:
  push: {branches: [main]}
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run bundle
      - name: Fail if committed bundle is stale
        run: git diff --exit-code scripts/fleetd/fleetd.bundle.mjs
      - run: npm run test:bundle

  board:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: board/package-lock.json
      - run: npm --prefix board ci
      - run: npm --prefix board run build
      - name: Fail if committed board build is stale
        run: git diff --exit-code scripts/fleetd/board-dist

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: brew install tmux
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
