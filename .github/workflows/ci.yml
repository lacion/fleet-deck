name: CI
on:
  push: {branches: [main]}
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
        # Shared-runner lanes are slow and noisy in exactly the way the macOS
        # advisory lane is — every wait routes through the WAIT_SCALE knob
        # (tests/helpers/wait.mjs), so give the Linux lanes the same headroom
        # instead of tuning timeouts one flake at a time.
        env:
          FLEETDECK_TEST_WAIT_SCALE: 3

  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run bundle
      - name: Fail if committed bundle is stale
        run: git diff --exit-code scripts/fleetd/fleetd.bundle.mjs
      - run: npm run test:bundle
        env:
          FLEETDECK_TEST_WAIT_SCALE: 3

  board:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: board/package-lock.json
      - run: npm --prefix board ci --ignore-scripts
      - run: npm --prefix board run build
      - name: Fail if committed board build is stale
        run: git diff --exit-code scripts/fleetd/board-dist

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install tmux
        run: brew install tmux
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
        env:
          FLEETDECK_TEST_WAIT_SCALE: 3

  # Four manifests carry the same version string, and nothing used to enforce
  # that. Standalone makes the drift user-visible: the npm version and the plugin
  # version are compared at every SessionStart, and a mismatch there is reported
  # to the user as a "restart your service" warning — so a release that forgets
  # one manifest now produces a warning that is simply wrong.
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Fail if the four manifests disagree on the version
        run: |
          pkg=$(node -p "require('./package.json').version")
          plugin=$(node -p "require('./.claude-plugin/plugin.json').version")
          market=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          board=$(node -p "require('./board/package.json').version")
          echo "package.json                    $pkg"
          echo ".claude-plugin/plugin.json      $plugin"
          echo ".claude-plugin/marketplace.json $market"
          echo "board/package.json              $board"
          for v in "$plugin" "$market" "$board"; do
            if [ "$v" != "$pkg" ]; then
              echo "::error::version drift — package.json says $pkg but a sibling manifest says $v"
              exit 1
            fi
          done
          echo "✓ all four agree on $pkg"

  # 0.16.0 — the hook scripts run on every installed machine at every
  # SessionStart with the user's full environment, and marketplace installs
  # track git main UNGATED (no npm publish, no tag). The bundle drift gate
  # covers only the bundled artifacts, so this job is the checkpoint for the
  # unbundled execution path: hooks.json, the three hook scripts, and the
  # fleetd/ source modules they import (config, takeover, env-scrub). Any
  # change to that closure must ride a release — signalled by a version bump
  # in the same diff — never slip in on an ordinary commit.
  hook-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Fail if hook execution paths changed without a version bump
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          # Push to main with the same before/after (e.g. branch creation) — nothing to check.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "no base to compare — skipping"
            exit 0
          fi
          git fetch --no-tags origin "$BASE" || true
          WATCHED="hooks/hooks.json scripts/fleet-hook.mjs scripts/fleet-sessionstart.mjs scripts/fleet-watch.mjs scripts/fleetd/config.mjs scripts/fleetd/takeover.mjs scripts/fleetd/env-scrub.mjs"
          CHANGED=$(git diff --name-only "$BASE" HEAD -- $WATCHED || true)
          if [ -z "$CHANGED" ]; then
            echo "✓ hook execution closure untouched"
            exit 0
          fi
          echo "hook execution closure changed:"
          echo "$CHANGED"
          VERSION_CHANGED=$(git diff --name-only "$BASE" HEAD -- package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json board/package.json || true)
          if [ -z "$VERSION_CHANGED" ]; then
            echo "::error::hook scripts (or their fleetd/ import closure) changed but no version manifest did — code that runs at every user's SessionStart must ride a release"
            exit 1
          fi
          echo "✓ hook closure changed alongside a version bump (release-bound)"
